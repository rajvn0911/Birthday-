<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise Lovebug 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@700&family=Caveat:wght@700&family=Lobster&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(
        135deg,
        #ffd1dc,
        #ffb6d9,
        #b8e4ff,
        #87cefa
    );
}

/* Screens */

.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hidden{
    display:none;
}

.main-title{
    font-family:'Great Vibes',cursive;
    color:white;
    font-size:clamp(3rem,8vw,5rem);
    text-shadow:0 0 15px rgba(255,255,255,.7);
}

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4f9a;
    font-size:1.1rem;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

button:hover{
    transform:scale(1.05);
}

.line{
    opacity:0;
    margin:15px 0;
    animation:fadeIn 1s forwards;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Birthday Text */

#birthdayText{
    font-family:'Great Vibes',cursive;
    font-size:clamp(3rem,10vw,7rem);
    color:white;
    text-shadow:
        0 0 10px white,
        0 0 20px #ff69b4,
        0 0 40px #87cefa;
}

/* Balloons */

.balloon{
    position:absolute;
    bottom:-100px;
    animation:floatUp linear infinite;
}

/* Pets */

.pet{
    position:absolute;
    bottom:-100px;
    animation:floatUp linear infinite;
}

/* Confetti */

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-20px;
    animation:fall linear infinite;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

@media(max-width:768px){

    button{
        width:85%;
        max-width:300px;
    }

    #birthdayText{
        line-height:1.3;
    }
}

</style>

</head>

<body>

<!-- PAGE 1 -->

<div class="screen" id="page1">

```
<h1 class="main-title">
    💝 Ready For A Surprise?
</h1>

<button onclick="showPage2()">
    Continue ✨
</button>
```

</div>

<!-- PAGE 2 -->

<div class="screen hidden" id="page2">

```
<div id="messageContainer"></div>

<button
    id="surpriseBtn"
    onclick="showBirthday()"
    style="display:none;">
    Click For Surprise 🎁
</button>
```

</div>

<!-- PAGE 3 -->

<div class="screen hidden" id="page3">

```
<div id="birthdayText"></div>
```

</div>

<!-- MUSIC -->

<audio id="music" loop>
    <source src="lovebug.mp3" type="audio/mpeg">
</audio>

<script>

function showPage2(){

    page1.classList.add("hidden");
    page2.classList.remove("hidden");

    const lines = [

        {
            text:"Unplanned Friendship...",
            font:"Pacifico",
            color:"#ff4f9a"
        },

        {
            text:"Unexpected Bond...",
            font:"Dancing Script",
            color:"#6a5acd"
        },

        {
            text:"Right Person...",
            font:"Caveat",
            color:"#ff1493"
        },

        {
            text:"Right Time...",
            font:"Lobster",
            color:"#4169e1"
        },

        {
            text:"That's Uhhh ❤️",
            font:"Great Vibes",
            color:"#ff1493"
        }
    ];

    let index = 0;

    function showLine(){

        if(index < lines.length){

            let item = document.createElement("div");

            item.className = "line";

            item.innerHTML =
            `<h2 style="
                font-family:'${lines[index].font}',cursive;
                color:${lines[index].color};
                font-size:${index===4?'4rem':'2.2rem'};
            ">
                ${lines[index].text}
            </h2>`;

            messageContainer.appendChild(item);

            index++;

            setTimeout(showLine,1500);

        }else{

            surpriseBtn.style.display="inline-block";
        }
    }

    showLine();
}

function showBirthday(){

    page2.classList.add("hidden");
    page3.classList.remove("hidden");

    document.getElementById("music")
    .play()
    .catch(()=>{});

    createPets();
    createBalloons();
    createConfetti();

    const text =
    "🎂 Happy Birthday Lovebug 💖";

    let i = 0;

    function type(){

        if(i < text.length){

            birthdayText.innerHTML += text.charAt(i);

            i++;

            setTimeout(type,150);
        }
    }

    type();
}

function createPets(){

    const pets=["🐶","🐱","🐕","🐈"];

    for(let i=0;i<20;i++){

        let pet=document.createElement("div");

        pet.className="pet";

        pet.innerHTML=
        pets[Math.floor(Math.random()*pets.length)];

        pet.style.left=Math.random()*100+"vw";

        pet.style.fontSize=
        (Math.random()*20+30)+"px";

        pet.style.animationDuration=
        (Math.random()*8+8)+"s";

        document.body.appendChild(pet);
    }
}

function createBalloons(){

    const balloons=[
        "🎈","🎈","🎈",
        "💖","✨"
    ];

    for(let i=0;i<25;i++){

        let balloon=document.createElement("div");

        balloon.className="balloon";

        balloon.innerHTML=
        balloons[Math.floor(Math.random()*balloons.length)];

        balloon.style.left=
        Math.random()*100+"vw";

        balloon.style.fontSize=
        (Math.random()*20+35)+"px";

        balloon.style.animationDuration=
        (Math.random()*8+6)+"s";

        document.body.appendChild(balloon);
    }
}

function createConfetti(){

    for(let i=0;i<120;i++){

        let confetti=
        document.createElement("div");

        confetti.className="confetti";

        confetti.style.left=
        Math.random()*100+"vw";

        confetti.style.background=
        `hsl(${Math.random()*360},
        100%,60%)`;

        confetti.style.animationDuration=
        (Math.random()*4+3)+"s";

        document.body.appendChild(confetti);
    }
}

</script>

</body>
</html>
