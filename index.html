<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(to bottom,#ffe4ec,#ffd6e8,#fff0f5);
    font-family:'Cinzel',serif;
}

.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:40px;
    background:#ff5fa2;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.title{
    font-family:'Great Vibes',cursive;
    font-size:70px;
    color:#d63384;
    text-align:center;
}

#animationScreen{
    display:none;
}

svg{
    width:100%;
    height:100%;
}

#wishes{
    position:absolute;
    right:5%;
    top:25%;
    font-size:24px;
    color:#c2185b;
    line-height:2;
    opacity:0;
}

.wish{
    opacity:0;
    transform:translateX(50px);
    animation:slideIn 1s forwards;
}

@keyframes slideIn{
    to{
        opacity:1;
        transform:translateX(0);
    }
}

.finalText{
    position:absolute;
    bottom:8%;
    width:100%;
    text-align:center;
    font-size:55px;
    color:#d81b60;
    font-family:'Great Vibes',cursive;
}

.heart{
    position:absolute;
    font-size:20px;
    animation:floatUp 8s linear infinite;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div id="intro" class="screen">

<div class="title">
A Special Birthday Surprise Awaits You ❤️
</div>

<br>

<button onclick="startSurprise()">
Ready For Surprise?
</button>

</div>

<div id="animationScreen">

<audio id="bgm" autoplay loop>
<source src="lovebug.mp3" type="audio/mpeg">
</audio>

<svg viewBox="0 0 1000 700">

<rect width="1000" height="700" fill="transparent"/>

<line id="trunk"
x1="500"
y1="650"
x2="500"
y2="650"
stroke="#8B5A2B"
stroke-width="18"
stroke-linecap="round"/>

</svg>

<div id="wishes"></div>

<div class="finalText">
🎂 Happy Birthday 🎂
<br>
<span style="font-size:28px">
May happiness bloom in your heart every day ❤️
</span>
</div>

</div>

<script>

function startSurprise(){

document.getElementById("intro").style.display="none";
document.getElementById("animationScreen").style.display="block";

let music=document.getElementById("bgm");
music.play().catch(()=>{});

growTree();

}

function growTree(){

let trunk=document.getElementById("trunk");

let current=650;

let interval=setInterval(()=>{

current-=4;

trunk.setAttribute("y2",current);

if(current<=350){

clearInterval(interval);

createHeartTree();
showWishes();

}

},20);

}

function createHeartTree(){

for(let i=0;i<250;i++){

let heart=document.createElement("div");

heart.innerHTML="❤";

heart.style.position="absolute";

let angle=Math.random()*Math.PI*2;
let r=Math.random()*140;

let x=500 + r*16*Math.pow(Math.sin(angle),3);

let y=250 - r*(13*Math.cos(angle)-5*Math.cos(2*angle)-2*Math.cos(3*angle)-Math.cos(4*angle))/16;

heart.style.left=x+"px";
heart.style.top=y+"px";

let colors=[
"#ff1744",
"#ff4081",
"#ff80ab",
"#e91e63",
"#ba68c8"
];

heart.style.color=
colors[Math.floor(Math.random()*colors.length)];

heart.style.fontSize=
(12+Math.random()*16)+"px";

document.body.appendChild(heart);

}

createFloatingHearts();

}

function showWishes(){

let wishes=document.getElementById("wishes");

wishes.style.opacity=1;

let texts=[
"❤️ Happy Birthday",
"🌸 Stay Beautiful",
"✨ Keep Smiling",
"🎂 Dream Big",
"💖 Shine Bright",
"🌹 Enjoy Every Moment"
];

texts.forEach((t,index)=>{

let div=document.createElement("div");

div.className="wish";

div.style.animationDelay=
(index*1.2)+"s";

div.innerHTML=t;

wishes.appendChild(div);

});

}

function createFloatingHearts(){

setInterval(()=>{

let h=document.createElement("div");

h.className="heart";

h.innerHTML="💖";

h.style.left=Math.random()*100+"%";

h.style.color=
["#ff4081","#ff80ab","#e91e63","#ba68c8"]
[Math.floor(Math.random()*4)];

document.body.appendChild(h);

setTimeout(()=>h.remove(),8000);

},300);

}

</script>

</body>
</html>
