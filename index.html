```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 💖</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(
        135deg,
        #ffb6d9 0%,
        #ffd1dc 30%,
        #b8e4ff 70%,
        #87cefa 100%
    );
}

.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hidden{
    display:none;
}

h1{
    color:#ffffff;
    text-shadow:2px 2px 15px rgba(0,0,0,0.2);
    font-size:clamp(2.2rem,6vw,4.5rem);
}

.typing-box{
    width:min(90%,700px);
    color:white;
    font-size:clamp(1.2rem,3vw,1.8rem);
    line-height:1.8;
    white-space:pre-wrap;
    text-shadow:1px 1px 8px rgba(0,0,0,0.15);
}

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4f9a;
    font-size:1.1rem;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

#birthdayText{
    font-size:clamp(2.5rem,7vw,5rem);
    color:white;
    text-shadow:0 0 20px rgba(255,255,255,.7);
}

/* Balloons */
.balloon{
    position:absolute;
    bottom:-100px;
    animation:floatUp linear infinite;
}

/* Pets */
.pet{
    position:absolute;
    bottom:-100px;
    animation:floatUp linear infinite;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}

/* Confetti */
.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-20px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

@media(max-width:768px){

    button{
        width:85%;
        max-width:280px;
    }

    .typing-box{
        font-size:1.1rem;
    }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="screen" id="page1">

    <h1>💝 Ready For A Surprise?</h1>

    <button onclick="openPage2()">
        Continue ✨
    </button>

</div>

<!-- PAGE 2 -->
<div class="screen hidden" id="page2">

    <div id="typingText" class="typing-box"></div>

    <button id="surpriseBtn"
            style="display:none;"
            onclick="openBirthday()">

        Click For Surprise 🎁

    </button>

</div>

<!-- PAGE 3 -->
<div class="screen hidden" id="page3">

    <div id="birthdayText"></div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="lovebug.mp3" type="audio/mpeg">
</audio>

<script>

const msg =
`Unplanned Friendship...

Unexpected Bond...

Right Time...

Right Person...

That's Uhhh ❤️`;

function openPage2(){

    document.getElementById("page1")
        .classList.add("hidden");

    document.getElementById("page2")
        .classList.remove("hidden");

    let i = 0;

    function type(){

        if(i < msg.length){

            document.getElementById("typingText")
                .innerHTML += msg.charAt(i);

            i++;

            setTimeout(type,80);

        }else{

            document.getElementById("surpriseBtn")
                .style.display="inline-block";
        }
    }

    type();
}

function openBirthday(){

    document.getElementById("page2")
        .classList.add("hidden");

    document.getElementById("page3")
        .classList.remove("hidden");

    document.getElementById("music")
        .play()
        .catch(()=>{});

    createPets();
    createBalloons();
    createConfetti();

    const text = "🎂 HAPPY BIRTHDAY 🎉";

    let j = 0;

    function typeBirthday(){

        if(j < text.length){

            document.getElementById("birthdayText")
                .innerHTML += text.charAt(j);

            j++;

            setTimeout(typeBirthday,150);
        }
    }

    typeBirthday();
}

/* PETS */

function createPets(){

    const pets=[
        "🐶","🐱","🐕","🐈"
    ];

    for(let i=0;i<20;i++){

        let pet=document.createElement("div");

        pet.className="pet";

        pet.innerHTML=
        pets[Math.floor(Math.random()*pets.length)];

        pet.style.left=Math.random()*100+"vw";

        pet.style.fontSize=
        (Math.random()*20+30)+"px";

        pet.style.animationDuration=
        (Math.random()*8+8)+"s";

        document.body.appendChild(pet);
    }
}

/* BALLOONS */

function createBalloons(){

    const balloons=[
        "🎈","🎈","🎈","💖","✨"
    ];

    for(let i=0;i<25;i++){

        let b=document.createElement("div");

        b.className="balloon";

        b.innerHTML=
        balloons[Math.floor(Math.random()*balloons.length)];

        b.style.left=Math.random()*100+"vw";

        b.style.fontSize=
        (Math.random()*20+35)+"px";

        b.style.animationDuration=
        (Math.random()*8+6)+"s";

        document.body.appendChild(b);
    }
}

/* CONFETTI */

function createConfetti(){

    for(let i=0;i<120;i++){

        let c=document.createElement("div");

        c.className="confetti";

        c.style.left=Math.random()*100+"vw";

        c.style.background=
        `hsl(${Math.random()*360},100%,60%)`;

        c.style.animationDuration=
        (Math.random()*4+3)+"s";

        document.body.appendChild(c);
    }
}

</script>

</body>
</html>
```
