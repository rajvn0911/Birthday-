```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffd86f);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

/* Screens */
.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.hidden{
    display:none;
}

h1{
    font-size:clamp(2rem, 6vw, 4rem);
    text-shadow:2px 2px 10px rgba(0,0,0,0.2);
}

p{
    margin-top:15px;
    font-size:clamp(1rem, 3vw, 1.5rem);
}

button{
    margin-top:30px;
    padding:15px 35px;
    font-size:1.2rem;
    border:none;
    border-radius:50px;
    cursor:pointer;
    background:white;
    color:#ff4081;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

button:hover{
    transform:scale(1.08);
}

/* Birthday Animation */
.birthday-content{
    animation:zoomIn 1.5s ease;
    z-index:10;
}

@keyframes zoomIn{
    from{
        opacity:0;
        transform:scale(0.5);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* Confetti */
.confetti{
    position:absolute;
    width:12px;
    height:12px;
    top:-20px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

/* Balloons */
.balloon{
    position:absolute;
    bottom:-100px;
    font-size:50px;
    animation:floatUp linear infinite;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}

/* Pets */
.pet{
    position:absolute;
    bottom:-100px;
    animation:floatPet linear infinite;
    z-index:5;
}

@keyframes floatPet{
    from{
        transform:translateY(0) rotate(0deg);
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
    }
}

/* Mobile */
@media(max-width:768px){
    .balloon{
        font-size:35px;
    }

    .pet{
        font-size:35px !important;
    }

    button{
        width:80%;
        max-width:300px;
    }
}
</style>
</head>

<body>

<!-- First Page -->
<div class="screen" id="startScreen">
    <h1>🎁 Ready For A Surprise?</h1>
    <p>Tap the button below...</p>
    <button onclick="showSurprise()">Click Here ❤️</button>
</div>

<!-- Surprise Page -->
<div class="screen hidden" id="surpriseScreen">
    <div class="birthday-content">
        <h1>🎂 HAPPY BIRTHDAY 🎉</h1>

        <p>
            Wishing you endless happiness,
            love, success and lots of smiles ❤️
        </p>

        <p>
            May all your dreams come true ✨
        </p>

        <h2 style="margin-top:20px;">
            🎈 Have an Amazing Day! 🎈
        </h2>
    </div>
</div>

<!-- Music -->
<audio id="birthdayMusic" loop>
    <!-- Replace with your own music -->
    <source src="lovebug.mp3" type="audio/mpeg">
</audio>

<script>

function showSurprise(){

    document.getElementById("startScreen")
        .classList.add("hidden");

    document.getElementById("surpriseScreen")
        .classList.remove("hidden");

    document.getElementById("birthdayMusic")
        .play()
        .catch(()=>{});

    createConfetti();
    createBalloons();
    createPets();
}

/* Confetti */
function createConfetti(){

    for(let i=0;i<150;i++){

        let confetti=document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left=Math.random()*100+"vw";

        confetti.style.background=
        `hsl(${Math.random()*360},100%,50%)`;

        confetti.style.animationDuration=
        (Math.random()*4+3)+"s";

        document.body.appendChild(confetti);
    }
}

/* Balloons */
function createBalloons(){

    const balloons=["🎈","🎈","🎈","🎉","✨"];

    for(let i=0;i<30;i++){

        let balloon=document.createElement("div");

        balloon.classList.add("balloon");

        balloon.innerHTML=
        balloons[Math.floor(Math.random()*balloons.length)];

        balloon.style.left=Math.random()*100+"vw";

        balloon.style.animationDuration=
        (Math.random()*8+6)+"s";

        document.body.appendChild(balloon);
    }
}

/* Dogs & Cats */
function createPets(){

    const pets=[
        "🐶","🐱","🐕","🐈",
        "🐶","🐱","🐕","🐈"
    ];

    for(let i=0;i<25;i++){

        let pet=document.createElement("div");

        pet.classList.add("pet");

        pet.innerHTML=
        pets[Math.floor(Math.random()*pets.length)];

        pet.style.left=Math.random()*100+"vw";

        pet.style.fontSize=
        (Math.random()*20+30)+"px";

        pet.style.animationDuration=
        (Math.random()*10+8)+"s";

        document.body.appendChild(pet);
    }
}
</script>

</body>
</html>
```
