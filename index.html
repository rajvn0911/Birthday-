```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#fde8ee;
font-family:'Dancing Script',cursive;
width:100vw;
height:100vh;
}

#intro{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#fde8ee;
z-index:100;
}

#intro h1{
font-size:3rem;
color:#d84f8d;
margin-bottom:25px;
text-align:center;
}

#intro button{
padding:15px 35px;
border:none;
border-radius:50px;
font-size:20px;
cursor:pointer;
background:#ff5ca8;
color:white;
}

#wishes{
position:absolute;
left:8%;
top:30%;
font-size:22px;
line-height:2.1;
color:#c84f86;
opacity:0;
transition:2s;
z-index:10;
}

#ground{
position:absolute;
bottom:18%;
left:12%;
width:76%;
height:2px;
background:white;
opacity:.8;
}

#final{
position:absolute;
bottom:8%;
width:100%;
text-align:center;
font-size:34px;
color:#d84f8d;
opacity:0;
transition:2s;
z-index:10;
}

canvas{
position:absolute;
inset:0;
}

</style>
</head>

<body>

<div id="intro">

<h1>A Special Birthday Surprise ❤️</h1>

<button onclick="startSurprise()">
Ready For Surprise?
</button>

</div>

<div id="wishes">
For you 💕<br>
Happy Birthday 🌹<br>
May God Bless You 🍀
</div>

<div id="ground"></div>

<div id="final">
🎂 Happy Birthday 🎂
</div>

<audio id="music" loop>
<source src="lovebug.mp3" type="audio/mpeg">
</audio>

<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let trunkHeight=0;
let hearts=[];

function startSurprise(){

document.getElementById("intro").style.display="none";

document.getElementById("music")
.play()
.catch(()=>{});

growTrunk();

}

function growTrunk(){

let interval=setInterval(()=>{

trunkHeight+=2;

if(trunkHeight>=150){

clearInterval(interval);

createHeartCanopy();

}

},20);

}

function randomPointInsideHeart(){

while(true){

let x=(Math.random()*2-1)*18;
let y=(Math.random()*2-1)*18;

let value=
Math.pow(
x*x+y*y-1,
3
)
-
x*x*y*y*y;

if(value<=0){

return {x,y};

}

}

}

function createHeartCanopy(){

const colors=[
"#ff1493",
"#ff69b4",
"#ff85a2",
"#ffc0cb",
"#ff4d6d",
"#ff8fab",
"#ffb347"
];

let count=0;

let timer=setInterval(()=>{

let p=randomPointInsideHeart();

hearts.push({

x:canvas.width*0.68+p.x*9,

y:canvas.height*0.34-p.y*9,

size:2+Math.random()*3,

scale:0,

color:
colors[
Math.floor(
Math.random()*colors.length
)
]

});

count++;

if(count>=1800){

clearInterval(timer);

document.getElementById("wishes")
.style.opacity=1;

document.getElementById("final")
.style.opacity=1;

}

},3);

}

function drawHeart(x,y,size,color){

ctx.save();

ctx.translate(x,y);

ctx.fillStyle=color;

ctx.beginPath();

ctx.moveTo(0,0);

ctx.bezierCurveTo(
-size,
-size,
-size*2,
size,
0,
size*2
);

ctx.bezierCurveTo(
size*2,
size,
size,
-size,
0,
0
);

ctx.fill();

ctx.restore();

}

function render(){

requestAnimationFrame(render);

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.beginPath();

ctx.strokeStyle="#f0b3c6";

ctx.lineWidth=16;

ctx.moveTo(
canvas.width*0.68,
canvas.height*0.82
);

ctx.lineTo(
canvas.width*0.68,
canvas.height*0.82-trunkHeight
);

ctx.stroke();

hearts.forEach(h=>{

if(h.scale<1){

h.scale+=0.03;

}

drawHeart(
h.x,
h.y,
h.size*h.scale,
h.color
);

});

}

render();

</script>

</body>
</html>
