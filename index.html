<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
background:#ffe6ee;
font-family:'Dancing Script',cursive;
}

#intro{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#intro h1{
color:#d63384;
font-size:3rem;
margin-bottom:30px;
text-align:center;
}

button{
padding:14px 35px;
border:none;
border-radius:50px;
background:#ff4f93;
color:white;
font-size:22px;
cursor:pointer;
}

#scene{
display:none;
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.ground{
position:absolute;
bottom:15%;
left:10%;
width:80%;
height:3px;
background:white;
}

#treeContainer{
position:absolute;
left:50%;
bottom:15%;
transform:translateX(-50%);
}

#trunk{
width:14px;
height:0;
background:#f4a6c1;
margin:auto;
border-radius:10px;
transition:height 4s linear;
}

#heartArea{
position:absolute;
width:280px;
height:250px;
left:50%;
transform:translateX(-50%);
bottom:180px;
}

.heart{
position:absolute;
font-size:12px;
opacity:0;
animation:appear 0.8s forwards;
}

@keyframes appear{
to{
opacity:1;
}
}

#wishes{
position:absolute;
left:8%;
top:25%;
color:#b03060;
font-size:24px;
line-height:1.9;
opacity:0;
transition:2s;
}

.final{
position:absolute;
bottom:8%;
width:100%;
text-align:center;
color:#d63384;
font-size:38px;
opacity:0;
transition:2s;
}

.floatHeart{
position:absolute;
font-size:18px;
animation:floatUp 8s linear infinite;
}

@keyframes floatUp{

0%{
transform:translateY(100px);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}
}

</style>
</head>

<body>

<div id="intro">

<h1>A Special Birthday Surprise ❤️</h1>

<button onclick="startSurprise()">
Ready For Surprise?
</button>

</div>

<div id="scene">

<div class="ground"></div>

<div id="wishes">
💖 Happy Birthday<br>
🌸 Stay Happy<br>
✨ Keep Smiling<br>
❤️ God Bless You
</div>

<div id="treeContainer">
<div id="trunk"></div>
</div>

<div id="heartArea"></div>

<div class="final">
🎂 Happy Birthday 🎂
</div>

<audio id="music" autoplay loop>
<source src="lovebug.mp3" type="audio/mpeg">
</audio>

</div>

<script>

function startSurprise(){

document.getElementById("intro").style.display="none";
document.getElementById("scene").style.display="block";

document.getElementById("music").play().catch(()=>{});

growTree();

}

function growTree(){

let trunk=document.getElementById("trunk");

trunk.style.height="160px";

setTimeout(()=>{

createHeartTree();

},4000);

}

function createHeartTree(){

const container=document.getElementById("heartArea");

const colors=[
"#ff1493",
"#ff69b4",
"#ffb6c1",
"#ff8c00",
"#da70d6",
"#ff4d6d"
];

let points=[];

for(let t=0;t<360;t+=2){

let rad=t*Math.PI/180;

let x=16*Math.pow(Math.sin(rad),3);

let y=
13*Math.cos(rad)
-5*Math.cos(2*rad)
-2*Math.cos(3*rad)
-Math.cos(4*rad);

points.push({
x:x,
y:y
});

}

let index=0;

let timer=setInterval(()=>{

if(index>220){

clearInterval(timer);

document.getElementById("wishes").style.opacity="1";
document.querySelector(".final").style.opacity="1";

createFloatingHearts();

return;
}

let p=points[Math.floor(Math.random()*points.length)];

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.color=
colors[Math.floor(Math.random()*colors.length)];

heart.style.left=(140+p.x*8)+"px";

heart.style.top=(100-p.y*8)+"px";

heart.style.fontSize=
(10+Math.random()*10)+"px";

container.appendChild(heart);

index++;

},40);

}

function createFloatingHearts(){

setInterval(()=>{

let h=document.createElement("div");

h.className="floatHeart";

h.innerHTML="💖";

h.style.left=Math.random()*100+"vw";

h.style.bottom="0";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},8000);

},500);

}

</script>

</body>
</html>
