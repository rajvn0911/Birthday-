```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ffb6d9,#ffd1dc,#b8e4ff,#87cefa);
}

/* screens */
.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hidden{display:none;}

h1{
    color:white;
    font-size:clamp(2rem,6vw,4rem);
    text-shadow:0 0 15px rgba(0,0,0,0.2);
}

button{
    margin-top:25px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4f9a;
    font-size:1.1rem;
    font-weight:bold;
    cursor:pointer;
}

/* text */
#text,#birthdayText{
    color:white;
    font-size:clamp(1.5rem,5vw,3rem);
    white-space:pre-wrap;
    text-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* effects */
.pet,.confetti{
    position:absolute;
    bottom:-100px;
    animation:floatUp linear infinite;
}

.confetti{
    width:10px;
    height:10px;
    top:-20px;
    animation-name:fall;
}

@keyframes floatUp{
    to{transform:translateY(-120vh);}
}

@keyframes fall{
    to{transform:translateY(110vh) rotate(720deg);}
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="screen" id="page1">
    <h1>💝 Ready For A Surprise?</h1>
    <button onclick="start()">start</button>
</div>

<!-- PAGE 2 -->
<div class="screen hidden" id="page2">
    <div id="text"></div>
    <button id="nextBtn" style="display:none" onclick="showBirthday()">click for surprise 🎁</button>
</div>

<!-- PAGE 3 -->
<div class="screen hidden" id="page3">
    <div id="birthdayText"></div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="lovebug.mp3" type="audio/mpeg">
</audio>

<script>

function start(){

    document.getElementById("music")
        .play()
        .catch(()=>{});

    page1.classList.add("hidden");
    page2.classList.remove("hidden");

    const msg = "that's uhhh";

    let i = 0;

    function type(){
        if(i < msg.length){
            text.innerHTML += msg.charAt(i);
            i++;
            setTimeout(type,120);
        }else{
            nextBtn.style.display="inline-block";
        }
    }

    type();
}

function showBirthday(){

    page2.classList.add("hidden");
    page3.classList.remove("hidden");

    createEffects();

    const msg = "happy birthday";
    let j = 0;

    function type2(){
        if(j < msg.length){
            birthdayText.innerHTML += msg.charAt(j);
            j++;
            setTimeout(type2,150);
        }
    }

    type2();
}

function createEffects(){

    const emojis=["🐶","🐱","🎈","💖","✨"];

    for(let i=0;i<30;i++){

        let e=document.createElement("div");
        e.className="pet";
        e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
        e.style.left=Math.random()*100+"vw";
        e.style.fontSize=(20+Math.random()*30)+"px";
        e.style.animationDuration=(6+Math.random()*6)+"s";
        document.body.appendChild(e);
    }

    for(let i=0;i<80;i++){

        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=`hsl(${Math.random()*360},100%,60%)`;
        c.style.animationDuration=(3+Math.random()*3)+"s";
        document.body.appendChild(c);
    }
}

</script>
    

</body>
</html>
