```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@700&family=Caveat:wght@700&family=Lobster&family=Great+Vibes&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ffb6d9,#ffd1dc,#b8e4ff,#87cefa);
}

/* screens */
.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hidden{display:none;}

h1{
    color:white;
    font-size:clamp(2rem,6vw,4rem);
    text-shadow:0 0 15px rgba(0,0,0,0.2);
}

button{
    margin-top:25px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4f9a;
    font-size:1.1rem;
    font-weight:bold;
    cursor:pointer;
}

/* typing area */
#text,#birthdayText{
    color:white;
    font-size:clamp(1.2rem,4vw,2.5rem);
    white-space:pre-wrap;
    text-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* floating effects */
.pet,.confetti{
    position:absolute;
    bottom:-100px;
    animation:floatUp linear infinite;
}

.confetti{
    width:10px;
    height:10px;
    top:-20px;
    animation-name:fall;
}

@keyframes floatUp{
    to{transform:translateY(-120vh);}
}

@keyframes fall{
    to{transform:translateY(110vh) rotate(720deg);}
}

/* letter animation */
.letter{
    display:inline-block;
    opacity:0;
    transform:translateY(10px);
    animation:pop 0.3s forwards;
}

@keyframes pop{
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="screen" id="page1">
    <h1>💝 Ready for a surprise?</h1>
    <button onclick="start()">start</button>
</div>

<!-- PAGE 2 -->
<div class="screen hidden" id="page2">
    <div id="text"></div>
    <button id="btn2" style="display:none" onclick="showBirthday()">
        click for surprise 🎁
    </button>
</div>

<!-- PAGE 3 -->
<div class="screen hidden" id="page3">
    <div id="birthdayText"></div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="lovebug.mp3" type="audio/mpeg">
</audio>

<script>

const fonts = [
    "Pacifico",
    "Dancing Script",
    "Caveat",
    "Lobster",
    "Great Vibes"
];

const colors = [
    "#ff4f9a",
    "#6a5acd",
    "#ff1493",
    "#4169e1",
    "#ffffff"
];

function randomStyle(){
    return `
        font-family:'${fonts[Math.floor(Math.random()*fonts.length)]}',cursive;
        color:${colors[Math.floor(Math.random()*colors.length)]};
        font-size:1.8rem;
        margin:5px;
    `;
}

/* PAGE 1 → PAGE 2 */
function start(){

    document.getElementById("music").play().catch(()=>{});

    page1.classList.add("hidden");
    page2.classList.remove("hidden");

    const text = [
        "Unplanned Friendship,",
        "Unexpected bond,",
        "Right time,",
        "Right Person,",
        "That's Uhhh "
    ];

    let i = 0;

    function typeLine(){

        if(i < text.length){

            let line = document.createElement("div");

            let word = text[i];
            let j = 0;

            function typeLetters(){

                if(j < word.length){

                    let span = document.createElement("span");
                    span.className = "letter";
                    span.style = randomStyle();
                    span.innerHTML = word.charAt(j);

                    line.appendChild(span);

                    j++;
                    setTimeout(typeLetters,80);

                }else{
                    textContainer.appendChild(line);
                    i++;
                    setTimeout(typeLine,400);
                }
            }

            typeLetters();

        }else{
            btn2.style.display="inline-block";
        }
    }

    typeLine();
}

/* PAGE 2 → PAGE 3 */
function showBirthday(){

    page2.classList.add("hidden");
    page3.classList.remove("hidden");

    createEffects();

    const msg = "So glad you exits. Have a fantastic birthday! 🎈";
    let i = 0;

    function type(){

        if(i < msg.length){

            let span = document.createElement("span");
            span.className = "letter";
            span.style.fontFamily = "Great Vibes";
            span.style.color = "white";
            span.style.fontSize = "3rem";
            span.innerHTML = msg.charAt(i);

            birthdayText.appendChild(span);

            i++;
            setTimeout(type,120);
        }
    }

    type();
}

/* EFFECTS */
function createEffects(){

    const emojis=["🐶","🐱","🎈","💖","✨"];

    for(let i=0;i<40;i++){

        let e=document.createElement("div");
        e.className="pet";
        e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
        e.style.left=Math.random()*100+"vw";
        e.style.fontSize=(20+Math.random()*30)+"px";
        e.style.animationDuration=(6+Math.random()*6)+"s";
        document.body.appendChild(e);
    }

    for(let i=0;i<80;i++){

        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=`hsl(${Math.random()*360},100%,60%)`;
        c.style.animationDuration=(3+Math.random()*3)+"s";
        document.body.appendChild(c);
    }
}

</script>

</body>
</html>
